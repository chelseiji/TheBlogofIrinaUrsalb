<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copii Sub Soare – Enter</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jersey+15&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');
  </style>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

<div class="main">

  <!-- first button -->
  <div class="start-btn" onclick="start()">
    <img src="custom-button.svg" alt="enter">
  </div>

  <!-- typing message -->
  <div class="typing-box" id="typingBox">
    <div class="title">Copii Sub Soare</div>
    <div class="message" id="message"></div>
  </div>

  <!-- password stuff -->
  <div class="password-area" id="passwordArea">
    <div class="password-label">Toate-s vechi și nouă toate</div>
    <input type="password" class="password-input" id="passwordInput">
    <br><br>
    <div class="red-btn" onclick="checkPassword()">
      <img src="redbutton.svg" alt="submit">
    </div>
  </div>

</div>

<!-- error popup -->
<div class="popup" id="popup">
  <div class="overlay"></div>
  <div class="popup-box">
    <div class="popup-text">Access denied, Authentication Failed</div>
    <div class="red-btn" onclick="closePopup()">
      <img src="redbutton.svg" alt="try again">
    </div>
  </div>
</div>

</body>
</html>
